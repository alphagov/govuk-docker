volumes:
  feedback-tmp:
  feedback-node-modules:

x-feedback: &feedback
  build:
    context: .
    dockerfile: Dockerfile.govuk-base
  image: feedback
  stdin_open: true
  tty: true
  volumes:
    - ${GOVUK_ROOT_DIR:-~/govuk}:/govuk:delegated
    - root-home:/root
    - feedback-tmp:/govuk/feedback/tmp
    - feedback-node-modules:/govuk/feedback/node_modules
  working_dir: /govuk/feedback

services:
  feedback-lite:
    <<: *feedback
    shm_size: 128m

  feedback-app: &feedback-app
    <<: *feedback
    depends_on:
      - content-store-app
      - feedback-redis
      - router-app
      - nginx-proxy
      - publishing-api-app
      - support-api-app
      - support-app
    environment:
      REDIS_URL: redis://feedback-redis
      VIRTUAL_HOST: feedback.dev.gov.uk
      BINDING: 0.0.0.0
    expose:
      - "3000"
    command: bin/rails s --restart

  feedback-app-live:
    <<: *feedback-app
    depends_on:
      - feedback-redis
      - nginx-proxy
    environment:
      GOVUK_WEBSITE_ROOT: https://www.gov.uk
      PLEK_SERVICE_CONTENT_STORE_URI: https://www.gov.uk/api
      VIRTUAL_HOST: feedback.dev.gov.uk
      BINDING: 0.0.0.0
      REDIS_URL: redis://feedback-redis

  feedback-app-integration:
    <<: *feedback-app
    depends_on:
      - feedback-redis
      - nginx-proxy
    environment:
      GOVUK_WEBSITE_ROOT: https://www.integration.publishing.service.gov.uk
      PLEK_SERVICE_CONTENT_STORE_URI: https://USERNAME:PASSWORD@www.integration.publishing.service.gov.uk/api # Update the credentials
      PLEK_SERVICE_PUBLISHING_API_URI: http://host.docker.internal:8080 # Requires `kubectl port-forward -n apps deploy/publishing-api 8080:8080`
      VIRTUAL_HOST: feedback.dev.gov.uk
      BINDING: 0.0.0.0
      REDIS_URL: redis://feedback-redis

  feedback-redis:
    image: redis
